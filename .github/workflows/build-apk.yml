name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permite compilar a petición tuya desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Instalar dependencias
      run: |
        npm cache clean --force
        rm -rf package-lock.json node_modules
        npm install

    - name: Construir la App Web 
      run: npm run build

    - name: Sincronizar plataforma Android de Capacitor
      run: npx cap sync android

    - name: Configurar Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Regenerar Gradle Wrapper
      working-directory: ./android
      run: gradle wrapper

    - name: Dar permisos de ejecución a Gradle
      run: chmod +x android/gradlew

    - name: Construir el APK
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: Subir APK como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: my-pos-app.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
